<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FINAL3D">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#221452" />
      <stop offset="55%" stop-color="#160a32" />
      <stop offset="100%" stop-color="#0c1638" />
    </linearGradient>
    <linearGradient id="accent" x1="12%" y1="8%" x2="88%" y2="92%">
